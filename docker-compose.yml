services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - packages:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/committees
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
    depends_on:
      backend:
        condition: service_healthy
        restart: true
    command: >
      sh -c 'npm run generate:schema && npm run dev -- --host 0.0.0.0 --port 5173'
    develop:
      watch:
        - action: restart
          path: ./backend/app/session/schemas.py

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys;
                      res = urllib.request.urlopen('http://localhost:8000/committees/health', timeout=3);
                      sys.exit(0) if res.getcode() == 200 else sys.exit(1); "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
      start_interval: 1s
    develop:
      watch:
        - action: restart
          path: ./backend/app/session/schemas.py
        - action: restart
          path: ./backend/app/session/models.py

volumes:
  packages:
