services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    env_file:
      - ./frontend/.env.local
    network_mode: host
    volumes:
      - ./frontend:/app
      - packages:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
        restart: true
    command: >
      sh -ec '
        lock_hash=$$(sha256sum package-lock.json | cut -d " " -f 1);
        if [ ! -f node_modules/.webmun-lock-hash ] ||
           [ "$$(cat node_modules/.webmun-lock-hash)" != "$$lock_hash" ]; then
          npm ci;
          printf "%s" "$$lock_hash" > node_modules/.webmun-lock-hash;
        fi;
        npm run generate:schema;
        exec npm run dev -- --host 0.0.0.0 --port 5173
      '
    develop:
      watch:
        - action: restart
          path: ./backend/app/session/schemas.py

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    # Supabase CLI binds locally to the host. This local stack targets Linux.
    network_mode: host
    volumes:
      - ./backend:/app
      - backend_packages:/app/.venv
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys;
                      res = urllib.request.urlopen('http://localhost:8000/committees/health', timeout=3);
                      sys.exit(0) if res.getcode() == 200 else sys.exit(1); "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
      start_interval: 1s
    develop:
      watch:
        - action: restart
          path: ./backend/app/session/schemas.py
        - action: restart
          path: ./backend/app/session/models.py

volumes:
  packages:
  backend_packages:
